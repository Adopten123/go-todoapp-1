services:
  todoapp:
    build:
      context: .
      dockerfile: ./cmd/todoapp/Dockerfile
    container_name: todoapp
    env_file:
      - .env
    environment:
      - HTTP_ADDR=:5050
      - POSTGRES_HOST=todoapp-postgres
      - REDIS_HOST=todoapp-redis
      - LOGGER_FOLDER=/app/out/logs
    volumes:
      - ./out/logs:/app/out/logs
    ports:
      - "5050:5050"
    restart: always

  todoapp-postgres:
    image: postgres:18.1-bookworm
    container_name: todoapp-env-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql
    restart: always

  todoapp-postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: todoapp-postgres-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:todoapp-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"

volumes:
  pgdata: